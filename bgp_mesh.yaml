---
- name: Deploy BGP Full Mesh
  hosts: all
  gather_facts: false

  tasks:
    - name: Step 1 - Push the BGP neighbor template
      ansible.netcommon.cli_config:
        config: "{{ lookup('template', 'bgp_neighbors.j2') }}"

    - name: Step 2 - Save the configuration
      ansible.netcommon.cli_command:
        command: write memory
