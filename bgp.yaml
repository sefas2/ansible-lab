---
- name: BGP Overlay Configuration
  hosts: all
  gather_facts: false

  tasks:
    - name: Step 1 - Initialize BGP and set router ID
      ansible.netcommon.cli_config:
        config: |
          router bgp {{ bgp_asn }}
          bgp router-id {{ loopback_ip.split('/')[0] }}

    - name: Step 2 - Save the configuration
      ansible.netcommon.cli_command:
        command: write memory
