---
- name: Deploy config
  hosts: routers
  gather_facts: false

  tasks:
    - name: deploy loopback configuration
      ansible.netcommon.cli_config:
        config: "{{ lookup('template', 'templates/frr_loopback.j2') }}"
      notify: Reload FRR

  handlers:
    - name: Reload FRR
      ansible.netcommon.cli_command:
        command: clear ip ospf process
